name: Auto Improve Nexyru
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run improvement checks
        run: node scripts/auto-improve.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Open PR if changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "auto: improvements from bot run $(date -u +%Y-%m-%d)"
          title: "auto-improve: bot suggestions"
          body: |
            Automated improvements suggested by the auto-improve bot.

            Review each change before merging — the bot edits files via string find/replace
            based on Claude's suggestions and may occasionally apply something unwanted.
          branch: auto-improve/${{ github.run_id }}
          delete-branch: true
          labels: auto-improve
